<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS App Launcher</title>
        <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- Optional: Sets the status bar style (default, black, or black-translucent) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Optional: Sets a custom name for the Home Screen icon -->
    <meta name="apple-mobile-web-app-title" content="iWidgetOS">

        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

            <link rel="apple-touch-icon" sizes="180x180" href="https://cdn-icons-png.flaticon.com/512/11244/11244686.png">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: url('https://www.iclarified.com/images/news/97556/465557/465557.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* IOS LIQUID GLASS BACKDROP */
        .liquid-glass-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(0, 0, 0, 0.25) 100%);
            backdrop-filter: blur(px) saturate(210%);
            -webkit-backdrop-filter: blur(45px) saturate(210%);
            filter: url(#liquid-glass-distortion);
            z-index: 1;
        }

        /* IOS INTERFACE WRAPPER */
        .launchpad-container {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 24px 40px 24px;
            overflow-y: auto;
        }

        /* iOS-style Search Input bar */
        .search-container {
            margin-bottom: 30px;
            width: 100%;
            max-width: 360px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-bar {
            width: 100%;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.1), inset 0 1px 0px rgba(255,255,255,0.2);
        }

        .search-bar::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-bar:focus {
            background: rgba(255, 255, 255, 0.28);
            text-align: left;
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.2);
        }

        /* iOS Grid Layout targeting custom viewports */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(76px, 76px));
            grid-gap: 28px 22px;
            justify-content: center;
            width: 100%;
            max-width: 480px;
            padding-bottom: 40px;
        }

        /* iOS Icon Wrapper Module */
        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: white;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.33, 1, 0.68, 1);
        }

        .app-item:active {
            transform: scale(0.85);
        }

        /* iOS Smooth Corner Radius Radius Geometry */
        .icon-wrapper {
            width: 64px;
            height: 64px;
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2), inset 0 0.5px 1px rgba(255,255,255,0.3);
            margin-bottom: 6px;
            overflow: hidden;
            position: relative;
        }

        .icon-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* iOS Label Styles */
        .app-name {
            font-size: 11.5px;
            font-weight: 400;
            line-height: 1.2;
            letter-spacing: -0.1px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .app-item.hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <svg style="display: none;">
        <filter id="liquid-glass-distortion" x="0%" y="0%" width="100%" height="100%">
            <feTurbulence type="fractalNoise" baseFrequency="0.005" numOctaves="2" result="noise" seed="3" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <div class="liquid-glass-backdrop"></div>

    <div class="launchpad-container">
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="Search" id="searchBox" oninput="filterLauncherApps()">
        </div>

        <div class="app-grid" id="appGrid">
            </div>
    </div>

    <script>
        // Exact 60 iOS Applications, integrated completely with your explicit custom URL inputs
        const appsData = [
            { name: "Apple Watch", url: "com.apple.bridge://x", icon: "com.apple.Bridge" },
            { name: "Calculator", url: "shortcuts://x-callback-url/run-shortcut?x-error=calc://", icon: "com.apple.calculator" },
            { name: "Camera", url: "shortcuts://x-callback-url/run-shortcut?x-error=camera://", icon: "com.apple.camera" },
            { name: "Compass", url: "shortcuts://run-shortcut?name=Icon%20Themer&input=%7B%22launch%22%3A%22Compass%22%7D", icon: "com.apple.compass" },
            { name: "Files", url: "shareddocuments://", icon: "com.apple.DocumentsApp" },
            { name: "FaceTime", url: "shortcuts://run-shortcut?name=Icon%20Themer&input=%7B%22launch%22%3A%22FaceTime%22%7D", icon: "com.apple.facetime" },
            { name: "Find My", url: "findmy://", icon: "com.apple.findmy" },
            { name: "Fitness", url: "activitytoday://", icon: "com.apple.Fitness" },
            { name: "Home", url: "com.apple.home://", icon: "com.apple.Home" },
            { name: "Magnifier", url: "data:text/html,%3Cscript%3Eonload%3Dself.close%3C/script%3E", icon: "com.apple.Magnifier" },
            { name: "Calendar", url: "calshow://", icon: "com.apple.mobilecal" },
            { name: "Photos", url: "photos-redirect://", icon: "com.apple.mobileslideshow" },
            { name: "Maps", url: "maps://", icon: "com.apple.Maps" },
            { name: "Notes", url: "mobilenotes://", icon: "com.apple.mobilenotes" },
            { name: "Reminders", url: "x-apple-reminderkit://", icon: "com.apple.reminders" },
            { name: "Music", url: "music://", icon: "com.apple.Music" },
            { name: "Podcasts", url: "podcasts://itunes.apple.com/", icon: "com.apple.podcasts" },
            { name: "App Store", url: "itms-apps://itunes.apple.com/", icon: "com.apple.AppStore" },
            { name: "Mail", url: "message://", icon: "com.apple.mobilemail" },
            { name: "Safari", url: "http://", icon: "com.apple.mobilesafari" },
            { name: "Messages", url: "messages://", icon: "com.apple.MobileSMS" },
            { name: "Contacts", url: "shortcuts://x-callback-url/run-shortcut?x-error=contact://", icon: "com.apple.MobileAddressBook" },
            { name: "TV", url: "videos://", icon: "com.apple.tv" },
            { name: "Books", url: "ibooks://", icon: "com.apple.iBooks" },
            { name: "News", url: "applenews://", icon: "com.apple.news" },
            { name: "Stocks", url: "stocks://", icon: "com.apple.stocks" },
            { name: "Weather", url: "shortcuts://x-callback-url/run-shortcut?x-error=weather://", icon: "com.apple.weather" },
            { name: "Voice Memos", url: "shortcuts://x-callback-url/run-shortcut?x-error=voicememos://", icon: "com.apple.VoiceMemos" },
            { name: "Settings", url: "app-prefs://", icon: "com.apple.Preferences" },
            { name: "Clock", url: "shortcuts://x-callback-url/run-shortcut?x-error=clock-worldclock://", icon: "com.apple.mobiletimer" },
            { name: "Health", url: "x-apple-health://", icon: "com.apple.Health" },
            { name: "Wallet", url: "wallet://", icon: "com.apple.Passbook" },
            { name: "Shortcuts", url: "shortcuts://", icon: "com.apple.Shortcuts" },
            { name: "Tips", url: "shortcuts://x-callback-url/run-shortcut?x-error=x-apple-tips://", icon: "com.apple.tips" },
            { name: "Translate", url: "shortcuts://x-callback-url/run-shortcut?x-error=translate://", icon: "com.apple.Translate" },
            { name: "Freeform", url: "shortcuts://x-callback-url/run-shortcut?x-error=freeform://", icon: "com.apple.freeform" },
            { name: "Phone", url: "shortcuts://x-callback-url/run-shortcut?x-error=mobilephone://", icon: "com.apple.mobilephone" },
            { name: "iTunes Store", url: "itms://", icon: "com.apple.MobileStore" },
            { name: "VoiceOver", url: "voiceover://", icon: "com.apple.VoiceOver" },
            { name: "App Clips", url: "appclips://", icon: "com.apple.AppClips" },
            { name: "TestFlight", url: "itms-beta://", icon: "com.apple.TestFlight" },
            { name: "Journal", url: "journal://", icon: "com.apple.Journal" },
            { name: "GarageBand", url: "garageband://", icon: "com.apple.garageband" },
            { name: "iMovie", url: "imovie://", icon: "com.apple.iMovie" },
            { name: "Pages", url: "pages://", icon: "com.apple.Pages" },
            { name: "Numbers", url: "numbers://", icon: "com.apple.Numbers" },
            { name: "Keynote", url: "keynote://", icon: "com.apple.Keynote" },
            { name: "Swift Playgrounds", url: "playgrounds://", icon: "com.apple.Playgrounds" },
            { name: "Game Center", url: "gamecenter://", icon: "com.apple.gamecenter" },
            { name: "Voice Recorder", url: "audiorecorder://", icon: "com.apple.AudioRecorder" },
            { name: "System Config", url: "sysconfig://", icon: "com.apple.SystemConfiguration" },
            { name: "Developer", url: "apple-developer://", icon: "com.apple.Developer" },
            { name: "Feedback", url: "applefeedback://", icon: "com.apple.appleseed.FeedbackAssistant" },
            { name: "Support", url: "applesupport://", icon: "com.apple.Support" },
            { name: "Classroom", url: "classroom://", icon: "com.apple.classroom" },
            { name: "Schoolwork", url: "schoolwork://", icon: "com.apple.schoolwork" },
            { name: "AirPort", url: "airportutility://", icon: "com.apple.AirPortUtility" },
            { name: "Apple Store", url: "applestore://", icon: "com.apple.store.Jolly" },
            { name: "Configurator", url: "appleconfigurator://", icon: "com.apple.configurator" },
            { name: "Remote", url: "remote://", icon: "com.apple.Remote" },
            { name: "TV Remote", url: "tvremote://", icon: "com.apple.TVRemote" }
        ];

        const gridElement = document.getElementById('appGrid');

        appsData.forEach(app => {
            const anchor = document.createElement('a');
            anchor.href = app.url;
            anchor.className = 'app-item';

            // Pointing directly to your online Cloudflare Pages asset path directory
            const serverSrc = `https://ioasetticons.pages.dev/assets/${app.icon}-large.png`;

            anchor.innerHTML = `
                <div class="icon-wrapper">
                    <img src="${serverSrc}" alt="${app.name}" onerror="this.onerror=null; this.src='https://g.deno.dev/gh/vanyatb/macos-icons/icons/App%20Store.png';">
                </div>
                <span class="app-name">${app.name}</span>
            `;
            gridElement.appendChild(anchor);
        });

        // Live grid search logic
        function filterLauncherApps() {
            const query = document.getElementById('searchBox').value.toLowerCase().trim();
            const items = document.getElementsByClassName('app-item');
            
            for (let i = 0; i < items.length; i++) {
                const title = items[i].querySelector('.app-name').innerText.toLowerCase();
                if (title.includes(query)) {
                    items[i].classList.remove('hidden');
                } else {
                    items[i].classList.add('hidden');
                }
            }
        }
    </script>
</body>
</html>
